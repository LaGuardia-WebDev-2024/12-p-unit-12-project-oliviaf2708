<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>What Are All My Favorites??</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        🎥 What is my favorite movie?
        <select id="movie-answer">
          <option value="movie1">How to Loose a Guy in 10 Days</option>
          <option value="movie2">Terminator 2: Judgment Day</option>
          <option value="movie3">La La Land</option>
          <option value="movie4">The Devil Wears Prada</option>
        </select>
      </label>
      <button type="submit">Check Movie Answer</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p>
      <img class="movie-pic" width="200">
      <img class="womp-pic" width="200">
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        ✈️ What is my favorite place to travel?
        <select id="book-answer">
          <option value="place1">Hawaii</option>
          <option value="place2">Paris</option>
          <option value="place3">London</option>
          <option value="place4">Italy</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
      <img class="place-pic" width="200">
      <img class="nope-pic" width="200">
    </div>
    <form id="cuisine-form">
      <label>
        🥘 What is my favorite cuisine to eat?
        <select id="cuisine-answer">
          <option value="cuisine1">Italian</option>
          <option value="cuisine2">Mediterranean</option>
          <option value="cuisine3">Japanese</option>
          <option value="cuisine4">Filipino</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="cuisine-result">
      <p id="cuisine-text"></p>
      <img class="cuisine-pic" width="200">
      <img class="nah-pic" width="200">
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
    
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "movie3") {
          $("#movie-text").text("YESSSS YOU GOT IT!");
          $(".movie-pic").attr("src","https://m.media-amazon.com/images/M/MV5BMzUzNDM2NzM2MV5BMl5BanBnXkFtZTgwNTM3NTg4OTE@._V1_FMjpg_UX1000_.jpg").show(2000);
          $(".womp-pic").hide()
        } 
        else {
          $("#movie-text").text("Womp Womp Try Again!");
          $(".womp-pic").attr("src","https://t3.ftcdn.net/jpg/09/81/24/92/360_F_981249230_FQZ6eJ3gJoK8dVlLfXU87aAtgRdAK789.jpg").show(2000)
          $(".movie-pic").hide()
        }
      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "place2") {
          $("#book-text").text("YESSSS!");
          $(".place-pic").attr("src","https://dynamic-media-cdn.tripadvisor.com/media/photo-o/17/15/6d/d6/paris.jpg?w=1400&h=-1&s=1").show(2000);
          $(".nope-pic").hide()
        } 
        else {
          $("#book-text").text("Try Again!");
          $(".nope-pic").attr("src","https://t3.ftcdn.net/jpg/09/81/24/92/360_F_981249230_FQZ6eJ3gJoK8dVlLfXU87aAtgRdAK789.jpg").show(2000);
          $(".place-pic").hide()
        }
      });

      //=======================Food Question jQuery Code
      $("#cuisine-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#cuisine-answer");
        var answer = $answer.val();

        if (answer === "cuisine4") {
          $("#cuisine-text").text("YESSSS!");
          $(".cuisine-pic").attr("src","https://food.fnr.sndimg.com/content/dam/images/food/fullset/2024/07/29/CHICKEN_ADOBO_H_f.jpg.rend.hgtvcom.1280.960.85.suffix/1722282685644.webp").show(2000);
          $(".nah-pic").hide()
        } 
        else {
          $("#cuisine-text").text("Try Again!");
          $(".nah-pic").attr("src","https://t3.ftcdn.net/jpg/09/81/24/92/360_F_981249230_FQZ6eJ3gJoK8dVlLfXU87aAtgRdAK789.jpg").show(2000);
          $(".cuisine-pic").hide()
        }
      });
      
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
